apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: banco-api-aluno
  title: Banco Api Aluno (minimal api C#)
  description: |
    Criado com o objetivo de ser uma minimal api em C# para consumo em um front de jogo feito em Unity e salvação dos dados na Azure (banco em nuvem).
    - C# foi escolhido por ser uma linguagem que conversa melhor com o Unity.
    - Faz parte de um projeto feito para o TCC da faculdade.
  tags:
    - unity
    - csharp
    - api
    - azure
  annotations:
    github.com/project-slug: RodrigoZimmermann/bancoApiAluno
spec:
  type: service
  lifecycle: experimental
  owner: rodrigo-zimmermann
  providesApis:
    - api-alunos-v1
